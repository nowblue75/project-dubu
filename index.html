<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>프로젝트 두부 - 순두부 르뱅쿠키 시뮬레이터</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=Outfit:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #F9F7F4;
            --primary: #926C4F;
            --primary-dark: #6F4E37;
            --accent: #EADBC8;
            --shadow: 0 10px 40px rgba(0, 0, 0, 0.05);
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Noto Sans KR', sans-serif;
            background-color: var(--bg-color);
            color: #333;
            display: flex;
            justify-content: center;
            min-height: 100vh;
            padding: 2rem 1rem;
            line-height: 1.5;
        }

        .container { width: 100%; max-width: 600px; animation: fadeIn 0.8s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .card { background: #FFF; border: 1px solid #EEE; border-radius: 28px; padding: 2rem; box-shadow: var(--shadow); margin-bottom: 2rem; }
        h2 { font-size: 0.9rem; font-weight: 700; margin-bottom: 1.2rem; color: #888; text-transform: uppercase; letter-spacing: 0.05em; }
        .section-title { border-bottom: 2px solid var(--accent); padding-bottom: 0.5rem; display: inline-block; margin-bottom: 1.5rem; color: var(--primary-dark); }

        /* Input Controls */
        .form-row { display: grid; grid-template-columns: 1.2fr 0.8fr; gap: 1.5rem; margin-bottom: 1.5rem; }
        .form-group { display: flex; flex-direction: column; gap: 0.6rem; }
        label { font-size: 0.85rem; font-weight: 600; color: #666; }
        select, input[type="number"] {
            width: 100%; padding: 0.9rem 1.2rem; border: 1.5px solid #EEE; border-radius: 14px; 
            font-family: inherit; font-size: 1.1rem; font-weight: 600; color: var(--primary-dark); outline: none; transition: var(--transition);
        }

        .btn-group { display: flex; flex-wrap: wrap; gap: 0.8rem; margin-bottom: 1rem; }
        .btn-check { display: none; }
        .btn-label { padding: 0.7rem 1.4rem; background: #FFF; border: 1.5px solid #EEE; border-radius: 12px; font-size: 0.9rem; font-weight: 500; color: #555; cursor: pointer; transition: var(--transition); }
        .btn-check:checked + .btn-label { border-color: var(--primary); color: var(--primary); box-shadow: 0 4px 15px rgba(146,108,79,0.12); font-weight: 700; }

        #calc-btn { width: 100%; padding: 1.1rem; background: #FFF; border: 1.5px solid #DDD; color: #444; border-radius: 14px; font-size: 1rem; font-weight: 700; cursor: pointer; transition: var(--transition); margin-top: 1rem; }
        #calc-btn:hover { border-color: #999; transform: translateY(-2px); }

        /* Results Area */
        #results { display: none; }
        .summary-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 1.5rem; }
        .summary-card { background: #FAF9F7; border-radius: 20px; padding: 1.5rem; text-align: center; }
        .summary-value { display: block; font-family: 'Outfit'; font-size: 2rem; font-weight: 800; color: #222; }
        .summary-label { font-size: 0.8rem; color: #999; }

        /* Weight Input inside Result Card */
        .weight-input-container { position: relative; margin-top: 5px; }
        .weight-input-field { width: 80px; text-align: center; border: 1px solid #DDD; border-radius: 8px; padding: 5px; font-family: 'Outfit'; font-weight: 700; background: #FFF; color: var(--primary-dark); }
        .weight-unit { font-size: 0.9rem; color: #999; margin-left: 5px; font-weight: 600; }

        .ing-table { width: 100%; border-collapse: collapse; }
        .ing-table th { text-align: left; font-size: 0.8rem; color: #999; padding: 0.8rem 0; border-bottom: 1px solid #EEE; }
        .ing-table td { padding: 1rem 0; font-size: 0.95rem; border-bottom: 1px solid #F5F5F5; }
        .col-name { font-weight: 600; color: #444; width: 45%; }
        .col-role { font-size: 0.85rem; color: #888; width: 35%; }
        .col-amount { font-family: 'Outfit'; font-weight: 700; color: var(--primary-dark); text-align: right; width: 20%; font-size: 1.1rem; }

        .sub-row td { padding: 0.6rem 0 1rem 0; border-bottom: 1px solid #F5F5F5; }
        .sub-info { background: #EAFAED; color: #27ae60; font-size: 0.8rem; padding: 0.6rem 1rem; border-radius: 10px; }

        .guide-box { padding: 1.5rem; border-radius: 18px; font-size: 0.9rem; margin-top: 1.5rem; line-height: 1.6; }
        .box-blue { background: #E4F1FE; color: #2C3E50; }
        .box-beige { background: #FFF9F3; color: #5D4037; display: none; }
        .box-title { font-weight: 700; margin-bottom: 0.8rem; display: block; }
        .box-title.blue { color: #2980B9; }
        .box-title.beige { color: #D35400; }

        footer { text-align: center; font-size: 0.75rem; color: #AAA; margin-top: 3rem; font-family: 'Outfit'; }

        @media (max-width: 480px) { .form-row { grid-template-columns: 1fr; } .summary-value { font-size: 1.6rem; } }
    </style>
</head>
<body>

    <div class="container">
        <div class="card">
            <h2 class="section-title">기본 재료 & 보유량</h2>
            <div class="form-row">
                <div class="form-group">
                    <label>어떤 재료 기준으로 계산할까요?</label>
                    <select id="ref-select"></select>
                </div>
                <div class="form-group">
                    <label>지금 가지고 있는 양 (g)</label>
                    <input type="number" id="ref-amount" value="180">
                </div>
            </div>

            <div class="btn-group" id="sugar-group" style="margin-bottom:1.5rem;"></div>
            <div class="btn-group" id="oven-group" style="margin-bottom:2rem;"></div>
            <button id="calc-btn">내 재료로 계산하기</button>
        </div>

        <div id="results">
            <div class="card">
                <h2>계산 결과</h2>
                <div class="summary-row">
                    <div class="summary-card">
                        <span class="summary-value" id="count-output">8개</span>
                        <span class="summary-label">쿠키 생산 개수</span>
                    </div>
                    <div class="summary-card">
                        <div class="weight-input-container">
                            <input type="number" id="target-weight" class="weight-input-field" value="165" min="80" max="200">
                            <span class="weight-unit">g</span>
                        </div>
                        <span class="summary-label">1개당 목표 무게 (80g~200g)</span>
                    </div>
                </div>

                <table class="ing-table">
                    <thead><tr><th>재료</th><th>역할</th><th>필요량</th></tr></thead>
                    <tbody id="ing-body"></tbody>
                </table>

                <div class="guide-box box-blue">
                    <span class="box-title blue" id="guide-title">베이킹 가이드</span>
                    <p id="guide-text"></p>
                </div>

                <div class="guide-box box-beige" id="sugar-info-box">
                    <span class="box-title beige" id="sugar-info-title">설탕 줄이기 — 가장 완벽한 대체 비율(50:50)</span>
                    <div id="sugar-info-list" style="font-size:0.85rem; color:#6D4C41;"></div>
                </div>
            </div>
            <footer>PROJECT DUBU CASE STUDY. ALL RIGHTS RESERVED.</footer>
        </div>
    </div>

    <script src="recipe-config.js"></script>
    <script>
        (function() {
            var config = window.RECIPE_CONFIG;
            var refSelect = document.getElementById('ref-select');
            var refAmount = document.getElementById('ref-amount');
            var sugarGroup = document.getElementById('sugar-group');
            var ovenGroup = document.getElementById('oven-group');
            var calcBtn = document.getElementById('calc-btn');
            var results = document.getElementById('results');
            var ingBody = document.getElementById('ing-body');
            var countOutput = document.getElementById('count-output');
            var targetWeightInput = document.getElementById('target-weight');
            var guideTitle = document.getElementById('guide-title');
            var guideText = document.getElementById('guide-text');
            var sugarBox = document.getElementById('sugar-info-box');
            var sugarList = document.getElementById('sugar-info-list');

            // 초기화
            var opts = '';
            for (var i = 0; i < config.baseIngredients.length; i++) {
                var ing = config.baseIngredients[i];
                opts += '<option value="' + ing.id + '"' + (ing.isReference ? ' selected' : '') + '>' + ing.name + ' (기준 ' + ing.amount + 'g)</option>';
            }
            refSelect.innerHTML = opts;

            sugarGroup.innerHTML = '<input type="radio" name="sugar" id="s-orig" class="btn-check" value="orig" checked><label for="s-orig" class="btn-label">오리지널</label>' +
                                  '<input type="radio" name="sugar" id="s-red" class="btn-check" value="red"><label for="s-red" class="btn-label">설탕 줄이기</label>';

            var ovenHtml = '';
            for (var j = 0; j < config.ovenTypes.length; j++) {
                var oven = config.ovenTypes[j];
                ovenHtml += '<input type="radio" name="oven" id="o-' + oven.id + '" class="btn-check" value="' + oven.id + '"' + (j===0?' checked':'') + '><label for="o-' + oven.id + '" class="btn-label">' + oven.name + '</label>';
            }
            ovenGroup.innerHTML = ovenHtml;

            // 계산 함수 (무게 입력 시 즉시 반응하도록 함)
            function calculate() {
                var selId = refSelect.value;
                var userVal = parseFloat(refAmount.value) || 0;
                var isRed = sugarGroup.querySelector('input:checked').value === 'red';
                var selOvenId = ovenGroup.querySelector('input:checked').value;
                var targetWeight = parseFloat(targetWeightInput.value) || 165;

                // 무게 제한 (80g ~ 200g)
                if (targetWeight < 80) targetWeight = 80;
                if (targetWeight > 200) targetWeight = 200;
                targetWeightInput.value = targetWeight;

                var refBase = config.baseIngredients.filter(function(x) { return x.id === selId; })[0];
                var scale = userVal / refBase.amount;

                // 총 반죽 중량 계산
                var totalMix = 0;
                for (var j = 0; j < config.baseIngredients.length; j++) {
                    totalMix += config.baseIngredients[j].amount * scale;
                }
                
                // 생산 개수 (총 중량 / 목표 무게)
                countOutput.innerText = Math.round(totalMix / targetWeight) + '개';

                var html = '';
                for (var k = 0; k < config.baseIngredients.length; k++) {
                    var it = config.baseIngredients[k];
                    var sub = config.sugarSubstitutes[it.id];
                    
                    if (isRed && sub) {
                        var pStr = sub.partAmounts.map(function(p) { return Math.round(it.amount * scale * p.ratio) + 'g'; }).join(' + ');
                        html += '<tr><td class="col-name">' + sub.combinedName + '</td><td class="col-role">' + it.role + '</td><td class="col-amount">' + pStr + '</td></tr>';
                        html += '<tr class="sub-row"><td colspan="3"><div class="sub-info">' + sub.note + '</div></td></tr>';
                    } else {
                        html += '<tr><td class="col-name">' + it.name + '</td><td class="col-role">' + it.role + '</td><td class="col-amount">' + Math.round(it.amount * scale) + 'g</td></tr>';
                    }
                }
                ingBody.innerHTML = html;

                // 오븐 및 시간 정밀 계산 (선형 보간법 적용)
                var oven = config.ovenTypes.filter(function(x) { return x.id === selOvenId; })[0];
                var table = config.bakingTimeTable;
                var tMin, tMax, categoryLabel, proTip;

                // 테이블 기반 보간 계산
                if (targetWeight <= table[0].weight) {
                    tMin = table[0].minTime; categoryLabel = table[0].label; proTip = table[0].tip;
                } else if (targetWeight >= table[table.length - 1].weight) {
                    tMin = table[table.length - 1].minTime; categoryLabel = table[table.length - 1].label; proTip = table[table.length - 1].tip;
                } else {
                    for (var m = 0; m < table.length - 1; m++) {
                        if (targetWeight >= table[m].weight && targetWeight <= table[m+1].weight) {
                            var p1 = table[m], p2 = table[m+1];
                            var ratio = (targetWeight - p1.weight) / (p2.weight - p1.weight);
                            tMin = Math.round(p1.minTime + (p2.minTime - p1.minTime) * ratio);
                            categoryLabel = targetWeight > (p1.weight + p2.weight)/2 ? p2.label : p1.label;
                            proTip = targetWeight > (p1.weight + p2.weight)/2 ? p2.tip : p1.tip;
                            break;
                        }
                    }
                }
                tMax = tMin + 2; // 2분 편차 고정
                
                var preTemp = oven.bakeTemp + config.preheatOffset;
                guideTitle.innerText = '예열 ' + preTemp + '℃ → 굽기 ' + oven.bakeTemp + '℃ · ' + tMin + '~' + tMax + '분 · ' + oven.name;
                guideText.innerHTML = '<span style="color:#2980B9; font-weight:700;">[' + categoryLabel + ']</span> ' + oven.guide + '<br><br><span style="color:#E67E22; font-weight:700;">💡 겉바속촉 한 끗 차이:</span> ' + proTip;

                if (isRed) {
                    sugarList.innerHTML = config.sugarInfo.tips.map(function(t) { return '<p style="margin-bottom:0.5rem;">• ' + t + '</p>'; }).join('');
                    sugarBox.style.display = 'block';
                } else {
                    sugarBox.style.display = 'none';
                }

                results.style.display = 'block';
            }

            calcBtn.onclick = function() { calculate(); results.scrollIntoView({ behavior: 'smooth' }); };
            targetWeightInput.onchange = calculate;
        })();
    </script>
</body>
</html>
